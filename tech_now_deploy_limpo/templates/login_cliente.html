<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Cliente | Tech Now</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="login-body">
    <!-- Glows em tons de Verde/Roxo para o Cliente -->
    <div class="glow glow-1 glow-client"></div>
    <div class="glow glow-2 glow-client"></div>

    <div class="login-container">
        <div class="login-box antigravity-login">
            <div class="login-header">
                <div class="icon-wrapper icon-emerald" style="width: max-content; margin: 0 auto 16px;">
                    <i data-lucide="user" style="width: 32px; height: 32px;"></i>
                </div>
                <h2>Área do Cliente</h2>
                <p>Acompanhe seus pedidos na Tech Now</p>
            </div>
            <form id="form-login-cliente" class="login-form">
                <div class="form-group">
                    <label>E-mail</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail"></i>
                        <input type="text" id="login-email" placeholder="seu@email.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <div class="input-wrapper" style="position: relative;">
                        <i data-lucide="lock"></i>
                        <input type="password" id="login-senha" placeholder="••••••••" required style="padding-right: 40px;">
                        <button type="button" onclick="togglePassword('login-senha', this)" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center;">
                            <i data-lucide="eye" style="width: 18px; height: 18px; margin: 0; color: inherit; position: relative; left: auto; top: auto; transform: none;"></i>
                        </button>
                    </div>
                </div>
                <!-- Botão com cor diferente para cliente -->
                <button type="submit" class="btn-primary login-btn" style="background: linear-gradient(to right, var(--emerald-500), #059669); box-shadow: 0 0 20px rgba(16,185,129,0.3);">Acessar Minha Conta</button>
                <div class="divider" style="display: flex; align-items: center; text-align: center; margin: 20px 0;">
                    <div style="flex: 1; border-bottom: 1px solid rgba(255,255,255,0.1);"></div>
                    <span style="padding: 0 10px; color: var(--text-secondary); font-size: 0.85rem;">ou continue com</span>
                    <div style="flex: 1; border-bottom: 1px solid rgba(255,255,255,0.1);"></div>
                </div>
                <button type="button" onclick="simularGoogleLogin()" class="btn-secondary" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; color: white; cursor: pointer; transition: all 0.3s ease;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Google
                </button>

            </form>
            <div class="login-footer">
                <p>Ainda não é cliente? <a href="/cadastro/cliente">Crie sua conta</a></p>
                <p style="margin-top: 12px;"><a href="/login/gerente" style="color: var(--text-secondary); font-size: 0.8rem;">Acesso Gerencial</a></p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function simularGoogleLogin() {
            // Cria um modal estético para simular o popup do Google
            const modalHtml = `
                <div id="google-mock-modal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease;">
                    <div class="glass-panel" style="width: 100%; max-width: 400px; padding: 40px; text-align: center; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom: 20px;">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        <h2 style="margin-bottom: 10px; font-size: 1.5rem;">Fazer login com o Google</h2>
                        <p style="color: var(--text-secondary); margin-bottom: 24px; font-size: 0.9rem;">(Ambiente de Simulação)</p>
                        
                        <input type="email" id="google-email-input" placeholder="seu@email.com" class="glass-input" style="width: 100%; text-align: center; margin-bottom: 20px; font-size: 1.1rem;" autofocus>
                        
                        <div style="display: flex; gap: 10px;">
                            <button onclick="document.getElementById('google-mock-modal').remove()" class="btn-secondary" style="flex: 1;">Cancelar</button>
                            <button onclick="processarGoogleLogin()" class="btn-primary" style="flex: 1; background: var(--blue-500);">Continuar</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            // Animate in
            setTimeout(() => {
                document.getElementById('google-mock-modal').style.opacity = '1';
                document.getElementById('google-email-input').focus();
            }, 10);
        }

        function processarGoogleLogin() {
            const email = document.getElementById('google-email-input').value;
            if(!email) return alert('Por favor, informe um e-mail válido.');
            
            const btn = document.querySelector('#google-mock-modal .btn-primary');
            btn.innerHTML = 'Conectando...';
            btn.disabled = true;

            fetch('/api/login/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    window.location.href = data.redirect;
                } else {
                    alert(data.message || 'Erro ao fazer login com Google.');
                    btn.innerHTML = 'Continuar';
                    btn.disabled = false;
                }
            })
            .catch(err => {
                console.error(err);
                alert('Erro de conexão.');
                btn.innerHTML = 'Continuar';
                btn.disabled = false;
            });
        }


        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();

        }

        }

        // Levitação com rotação invertida para diferenciar levemente do gerente
        gsap.to(".antigravity-login", {
            y: "-=12",
            rotationX: -1.5,
            rotationY: 1.5,
            duration: 4,
            yoyo: true,
            repeat: -1,
            ease: "sine.inOut"
        });

        document.getElementById('form-login-cliente').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const oldText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader" class="rotating"></i> Entrando...';
            lucide.createIcons();

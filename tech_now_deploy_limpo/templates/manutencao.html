<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenção - Tech Now</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #0f0f13;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --emerald-500: #10b981;
            --rose-500: #f43f5e;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
            z-index: 10;
        }
        .icon-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, var(--rose-500), #fb923c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(244, 63, 94, 0.4);
            animation: pulse 2s infinite ease-in-out;
        }
        h1 {
            font-size: 2rem;
            margin: 0 0 12px;
            font-weight: 700;
        }
        p {
            color: var(--text-secondary);
            line-height: 1.6;
            margin: 0 0 24px;
        }
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(244,63,94,0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(244, 63, 94, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(244, 63, 94, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(244, 63, 94, 0.4); }
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <div class="icon-container">
            <i data-lucide="settings" style="width: 40px; height: 40px; color: white;"></i>
        </div>
        <h1>Loja em Manutenção</h1>
        <p>Estamos realizando melhorias em nosso sistema para oferecer uma experiência de compra ainda melhor. Voltaremos em breve!</p>
        <div style="padding: 16px; background: rgba(0,0,0,0.3); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; color: var(--text-secondary);">
            Agradecemos a sua paciência.
        </div>
    </div>
    <script>
        lucide.createIcons();
        // Recarregar a página a cada 30 segundos para ver se a manutenção acabou
        setTimeout(() => window.location.reload(), 30000);
    </script>
</body>
</html>
